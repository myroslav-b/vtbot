version: '3.8'

services:
  vtbot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vtbot_container
    restart: unless-stopped
    environment:
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - VT_API_KEY=${VT_API_KEY}
    
    # Оскільки зараз бот використовує Long Polling (ініціює з'єднання сам), 
    # йому не потрібно відкривати порти назовні для вхідного трафіку.
    # Якщо ви в майбутньому перейдете на Webhooks, розкоментуйте та налаштуйте 
    # ці лейбли для Traefik, а також мережу:
    
    # networks:
    #   - traefik-public
    
    # labels:
    #   - "traefik.enable=true"
    #   # Домен, за яким бот буде отримувати запити (Webhooks)
    #   - "traefik.http.routers.vtbot.rule=Host(`bot.yourdomain.com`)"
    #   - "traefik.http.routers.vtbot.entrypoints=websecure"
    #   # Автоматичне отримання сертифікатів (в залежності від назви вашого resolver налаштуйте certresolver)
    #   - "traefik.http.routers.vtbot.tls.certresolver=letsencrypt"
    #   # Вкажіть внутрішній порт, на якому бот буде слухати Webhook запити
    #   - "traefik.http.services.vtbot.loadbalancer.server.port=8080"

# networks:
#   traefik-public:
#     external: true
